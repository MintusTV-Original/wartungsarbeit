<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wartung – Nextcloud</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e17;
      --surface: #111827;
      --border: rgba(99, 179, 237, 0.15);
      --accent: #63b3ed;
      --accent2: #f6ad55;
      --text: #e2e8f0;
      --muted: #718096;
      --glow: rgba(99, 179, 237, 0.08);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Hintergrundraster */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(99,179,237,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,179,237,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    /* Glühende Lichtquelle oben */
    body::after {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(99,179,237,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 56px 64px;
      max-width: 600px;
      width: 90%;
      box-shadow:
        0 0 0 1px rgba(99,179,237,0.05),
        0 32px 80px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.05);
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Eckakzent oben links */
    .card::before {
      content: '';
      position: absolute;
      top: -1px;
      left: -1px;
      width: 40px;
      height: 40px;
      border-top: 2px solid var(--accent);
      border-left: 2px solid var(--accent);
      border-radius: 2px 0 0 0;
    }

    /* Eckakzent unten rechts */
    .card::after {
      content: '';
      position: absolute;
      bottom: -1px;
      right: -1px;
      width: 40px;
      height: 40px;
      border-bottom: 2px solid var(--accent);
      border-right: 2px solid var(--accent);
      border-radius: 0 0 2px 0;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(99,179,237,0.08);
      border: 1px solid rgba(99,179,237,0.2);
      padding: 5px 12px;
      border-radius: 2px;
      margin-bottom: 32px;
      animation: fadeUp 0.8s 0.1s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.8); }
    }

    h1 {
      font-size: clamp(32px, 5vw, 44px);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.03em;
      color: #f7fafc;
      margin-bottom: 16px;
      animation: fadeUp 0.8s 0.15s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    h1 span {
      color: var(--accent);
    }

    p.sub {
      font-size: 16px;
      font-weight: 400;
      line-height: 1.7;
      color: var(--muted);
      margin-bottom: 40px;
      animation: fadeUp 0.8s 0.2s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin-bottom: 28px;
      animation: fadeUp 0.8s 0.25s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .status-row {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 40px;
      animation: fadeUp 0.8s 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .status-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
    }

    .status-label {
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .status-value {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .dot-ok {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #68d391;
    }

    .dot-warn {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent2);
      animation: pulse 1.5s ease-in-out infinite;
    }

    .text-ok   { color: #68d391; }
    .text-warn { color: var(--accent2); }

    .progress-wrap {
      margin-bottom: 40px;
      animation: fadeUp 0.8s 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .progress-bar {
      height: 3px;
      background: rgba(99,179,237,0.1);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #90cdf4);
      border-radius: 2px;
      animation: fill 3s ease-in-out infinite alternate;
    }

    @keyframes fill {
      from { width: 35%; }
      to   { width: 80%; }
    }

    .footer {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.08em;
      animation: fadeUp 0.8s 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .footer span {
      color: var(--accent);
    }

    /* Floating Partikel */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 1px;
      height: 1px;
      background: var(--accent);
      border-radius: 50%;
      animation: float linear infinite;
      opacity: 0;
    }

    @keyframes float {
      0%   { transform: translateY(100vh) translateX(0); opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.2; }
      100% { transform: translateY(-20px) translateX(30px); opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="particles" id="particles"></div>

  <div class="card">
    <div class="badge">
      <span class="badge-dot"></span>
      System-Status
    </div>

    <h1>Kurz in<br><span>Wartung.</span></h1>

    <p class="sub">
      Nextcloud wird gerade gewartet oder ist vorübergehend nicht erreichbar.
      Wir sind gleich wieder für dich da.
    </p>

    <div class="divider"></div>

    <div class="status-row">
      <div class="status-item">
        <span class="status-label">SERVER</span>
        <span class="status-value">
          <span class="dot-ok"></span>
          <span class="text-ok">Online</span>
        </span>
      </div>
      <div class="status-item">
        <span class="status-label">NEXTCLOUD</span>
        <span class="status-value">
          <span class="dot-warn"></span>
          <span class="text-warn">Nicht erreichbar</span>
        </span>
      </div>
      <div class="status-item">
        <span class="status-label">DATEN</span>
        <span class="status-value">
          <span class="dot-ok"></span>
          <span class="text-ok">Gesichert</span>
        </span>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-label">
        <span>Wiederherstellung läuft</span>
        <span id="pct">–</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="fill"></div>
      </div>
    </div>

    <div class="footer">
      Homeserver &nbsp;/&nbsp; <span id="ts">–</span>
    </div>
  </div>

  <script>
    // Datum/Uhrzeit live
    function updateTime() {
      const now = new Date();
      const opts = { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' };
      document.getElementById('ts').textContent = now.toLocaleString('de-DE', opts) + ' Uhr';
    }
    updateTime();
    setInterval(updateTime, 10000);

    // Fortschritts-Prozent simulieren (visuell)
    const fill = document.getElementById('fill');
    const pct  = document.getElementById('pct');
    let v = 35;
    setInterval(() => {
      v += (Math.random() - 0.3) * 3;
      v = Math.min(Math.max(v, 20), 85);
      fill.style.width = v.toFixed(0) + '%';
      pct.textContent  = v.toFixed(0) + '%';
    }, 2000);

    // Partikel erzeugen
    const wrap = document.getElementById('particles');
    for (let i = 0; i < 18; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left     = Math.random() * 100 + 'vw';
      p.style.width    = (Math.random() * 2 + 1) + 'px';
      p.style.height   = p.style.width;
      p.style.animationDuration  = (Math.random() * 14 + 10) + 's';
      p.style.animationDelay     = (Math.random() * 10) + 's';
      wrap.appendChild(p);
    }
  </script>
</body>
</html>
